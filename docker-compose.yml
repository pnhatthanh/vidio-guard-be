version: "3.9"

services:
  video-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: video-processing-demo
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    volumes:
      - outputs:/app/outputs
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      videoguard-ai:
        condition: service_started
    networks:
      - video-network
    restart: unless-stopped

  videoguard-ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: videoguard-ai
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    networks:
      - video-network
    restart: unless-stopped
    # ── GPU support (uncomment if host has NVIDIA GPU + nvidia-container-toolkit) ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - video-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  asynqmon-ui:
    image: hibiken/asynqmon:latest
    container_name: asynqmon-ui
    ports:
      - "8081:8080"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    networks:
      - video-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    networks:
      - video-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  video-network:
    driver: bridge

volumes:
  minio-data:
    driver: local
  outputs:
    driver: local
  redis-data:
    driver: local

version: "3.9"

services:
  video-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: video-api
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    volumes:
      - outputs:/app/outputs
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      image-moderation:
        condition: service_started
      # audio-moderation:
      #   condition: service_started
    networks:
      - video-network
    restart: unless-stopped

  image-moderation:
    build:
      context: ./image-moderation
      dockerfile: Dockerfile
    container_name: image-moderation
    ports:
      - "8000:8000"
    env_file:
      - ./image-moderation/.env
    volumes:
      - ./image-moderation/models:/app/models:ro
    networks:
      - video-network
    restart: unless-stopped

  # audio-moderation:
  #   build:
  #     context: ./audio-moderation
  #     dockerfile: Dockerfile
  #   container_name: audio-moderation
  #   ports:
  #     - "8001:8001"
  #   env_file:
  #     - ./audio-moderation/.env
  #   volumes:
  #     - ./audio-moderation/models:/app/models:ro
  #   networks:
  #     - video-network
  #   restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - video-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  asynqmon-ui:
    image: hibiken/asynqmon:latest
    container_name: asynqmon-ui
    ports:
      - "8081:8080"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    networks:
      - video-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    networks:
      - video-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vidioguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - video-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  video-network:
    driver: bridge

volumes:
  minio-data:
    driver: local
  outputs:
    driver: local
  redis-data:
    driver: local
  postgres_data:
    driver: local
